<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blog | Modelos de Currículo</title>

<meta name="description"
content="Artigos completos sobre currículo, emprego, entrevistas e carreira profissional.">

<meta name="robots" content="index, follow">
<link rel="canonical" href="https://modelosdecurriculo.online/blog/">

<style>

/* ===== MESMO ESTILO DA HOME ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f7fb;
color:#222;
}

.container{
width:90%;
max-width:1100px;
margin:auto;
padding:60px 0;
}

.hero{
background:linear-gradient(135deg,#4f46e5,#6366f1);
color:white;
text-align:center;
padding:70px 20px;
}

.hero h1{
font-size:36px;
}

/* POSTS */

.posts{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-top:30px;
}

.post{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.post a{
text-decoration:none;
color:#4f46e5;
font-weight:bold;
}

/* PAGINAÇÃO */

.pagination{
text-align:center;
margin-top:40px;
}

.pagination button{
padding:10px 16px;
margin:5px;
border:none;
background:#4f46e5;
color:white;
border-radius:6px;
cursor:pointer;
}

.pagination button.active{
background:#111827;
}

footer{
text-align:center;
padding:30px;
background:#111827;
color:white;
}

</style>
</head>

<body>

<header class="hero">
<h1>Blog de Currículos e Emprego</h1>
<p>Dicas práticas para conseguir entrevistas e melhorar sua carreira.</p>
</header>

<section class="container">

<div id="posts" class="posts"></div>

<div id="pagination" class="pagination"></div>

</section>

<footer>
<p>© 2026 Modelos de Currículo</p>
</footer>

<script>

/* =====================================
LISTA DE ARTIGOS (ADICIONE AQUI)
===================================== */

const articles = [

{
title:"Como fazer um currículo em 2026",
desc:"Passo a passo completo para conquistar entrevistas.",
link:"como-fazer-um-curriculo-2026.html"
},

{
title:"Modelos de Currículos Prontos para Baixar",
desc:"Templates profissionais atualizados.",
link:"modelo-curriculo-pronto-baixar.html"
},

{
title:"Currículo Simples: Exemplo Preenchido",
desc:"Modelo prático e profissional.",
link:"curriculo-simples-exemplo-preenchido.html"
},

{
title:"Como Fazer um Currículo para Primeiro Emprego",
desc:"Guia completo para conquistar sua primeira vaga.",
link:"curriculo-primeiro-emprego.html"
},

{
title:"Currículo Sem Experiência Profissional",
desc:"Aprenda a montar um currículo mesmo sem experiência.",
link:"curriculo-sem-experiencia-profissional.html"
}

];

/* =====================================
PAGINAÇÃO AUTOMÁTICA
===================================== */

const postsPerPage = 6;
let currentPage = 1;

function displayPosts(page){

const container = document.getElementById("posts");
container.innerHTML = "";

const start = (page-1)*postsPerPage;
const end = start + postsPerPage;

articles.slice(start,end).forEach(article => {

container.innerHTML += `
<article class="post">
<h3>${article.title}</h3>
<p>${article.desc}</p>
<a href="${article.link}">Ler artigo →</a>
</article>
`;

});

renderPagination();
}

function renderPagination(){

const totalPages = Math.ceil(articles.length/postsPerPage);
const pagination = document.getElementById("pagination");

pagination.innerHTML="";

for(let i=1;i<=totalPages;i++){

pagination.innerHTML += `
<button class="${i===currentPage?'active':''}"
onclick="changePage(${i})">${i}</button>
`;

}
}

function changePage(page){
currentPage = page;
displayPosts(page);
window.scrollTo({top:0,behavior:"smooth"});
}

displayPosts(currentPage);

</script>

</body>

</html>
